<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description"
        content="A powerful, AI-driven code workspace for snippets, documentation, and code improvement within the Global Notes ecosystem.">
    <title>Code Workspace - Global Notes Workspace</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <link rel="stylesheet" href="../CSS/index.css">
    <link rel="stylesheet" href="../CSS/code-workspace.css">
    <link rel="icon" type="image/png" href="../assets/images/logo_workspace.png" />
</head>

<body class="code-workspace-page">

    <div id="api-warning" class="api-warning-banner hidden">
        ⚠ AI features disabled. Ensure your Gemini API key is set in JS/config.js.
    </div>

    <header class="code-header">
        <div class="header-left">
            <a href="../app.html" class="btn ghost icon-only back-btn" title="Back to Home">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <a href="../index.html" class="header-brand">
                <img src="../assets/images/logo_workspace.png" alt="Global Notes Workspace" width="28" height="28">
                <h1 class="brand-h1">Global Code <span class="brand-accent">Workspace</span></h1>
            </a>
        </div>

        <div class="header-center">
            <select id="language-selector" class="lang-select">
                <optgroup label="Popular">
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="python">Python</option>
                    <option value="python3">Python 3</option>
                </optgroup>
                <optgroup label="Systems & App">
                    <option value="cpp">C++</option>
                    <option value="c">C</option>
                    <option value="rust">Rust</option>
                    <option value="go">Go</option>
                    <option value="kotlin">Kotlin</option>
                    <option value="swift">Swift</option>
                </optgroup>
                <optgroup label="Backend & Script">
                    <option value="java">Java</option>
                    <option value="csharp">C#</option>
                    <option value="ruby">Ruby</option>
                    <option value="php">PHP</option>
                    <option value="dart">Dart</option>
                    <option value="scala">Scala</option>
                </optgroup>
                <optgroup label="Functional">
                    <option value="elixir">Elixir</option>
                    <option value="erlang">Erlang</option>
                    <option value="racket">Racket</option>
                </optgroup>
                <optgroup label="Web & Data">
                    <option value="htmlmixed">HTML</option>
                    <option value="css">CSS</option>
                    <option value="sql">SQL</option>
                </optgroup>
            </select>
        </div>

        <div class="header-right">
            <button class="btn ghost ai-btn" id="ai-explain-btn" title="Explain Code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9.663 17h4.674"></path>
                    <path d="M10 20h4"></path>
                    <path d="M12 2v1"></path>
                    <path d="M12 15v2"></path>
                    <path d="M15.22 3.78l-.707.707"></path>
                    <path d="M8.78 14.22l-.707.707"></path>
                    <path d="M21.363 8.663h-1"></path>
                    <path d="M3.637 15.337h1"></path>
                    <path d="M19.363 15.337h1"></path>
                    <path d="M4.637 8.663h1"></path>
                    <path d="M15.22 14.22l.707.707"></path>
                    <path d="M8.78 3.78l.707.707"></path>
                    <circle cx="12" cy="11" r="4"></circle>
                </svg>
                Explain
            </button>
            <button class="btn ghost ai-btn" id="ai-docs-btn" title="Generate Docs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Docs
            </button>
            <button class="btn ghost ai-btn" id="ai-improve-btn" title="Improve Code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                Improve
            </button>
            <!-- Theme Quick Toggle -->
            <button class="btn ghost icon-only" id="theme-quick-toggle" title="Toggle Light/Dark Mode">
                <svg class="icon theme-icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon theme-icon-moon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <button class="btn primary" id="copy-code-btn">Copy</button>
            <button class="btn primary" id="save-snippet-btn">Save</button>
        </div>
    </header>

    <main class="code-layout">
        <aside class="code-sidebar">
            <div class="sidebar-top">
                <button class="btn primary full-width" id="new-snippet-btn">
                    + New Snippet
                </button>
                <div class="search-wrapper">
                    <svg class="search-icon-fixed" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="snippet-search" class="search-input" placeholder="Search snippets...">
                </div>
            </div>

            <ul class="snippets-list" id="snippets-list">
                <!-- Snippets will be injected here -->
            </ul>
        </aside>

        <section class="code-editor-container">
            <div id="editor-target"></div>

            <!-- AI Result Panel -->
            <div id="ai-result-panel" class="ai-result-container">
                <div class="ai-panel-resizer" id="ai-panel-resizer"></div>
                <div class="ai-panel-header">
                    <div class="ai-panel-title" id="ai-panel-title">AI Assistant</div>
                    <div class="ai-panel-actions">
                        <button class="panel-action-btn" id="expand-panel-btn" title="Expand/Collapse">⤢</button>
                        <button class="panel-close-btn" id="close-panel-btn">×</button>
                    </div>
                </div>
                <div class="ai-panel-content" id="ai-panel-content">
                    <!-- AI Response goes here -->
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="notification-toast">Snippet Saved!</div>

    <!-- Floating AI Chat will be injected by JS -->

    <!-- CodeMirror Core JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>

    <!-- Languages Support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>

    <!-- CodeMirror Addons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/comment/comment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/jump-to-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">



    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- App logic -->
    <script type="module" src="../JS/codeWorkspace.js"></script>
</body>

</html>
